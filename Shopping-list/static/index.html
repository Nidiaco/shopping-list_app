  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    body.dark-mode { background: #0f172a; color: #e5e7eb; }
    .checked-item span.item-name { opacity: 0.4; text-decoration: line-through; }
    .checked-item span.item-qty { opacity: 0.3; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    .slide-up { animation: slideUp 0.3s ease-out; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Dark mode overrides */
    .dark-mode { background: #0f172a !important; color: #e5e7eb !important; }
    .dark-mode .text-gray-900 { color: #e5e7eb !important; }
    .dark-mode .text-gray-400 { color: #9ca3af !important; }
    .dark-mode .text-gray-300 { color: #d1d5db !important; }
    .dark-mode .bg-white { background: #1e293b !important; }
    .dark-mode .bg-gray-50 { background: #1e293b !important; }
    .dark-mode .bg-gray-100 { background: #334155 !important; }
    .dark-mode .border-gray-100 { border-color: #475569 !important; }
    .dark-mode .border-gray-200 { border-color: #475569 !important; }
    .dark-mode input { background: #1e293b !important; color: #e5e7eb !important; border-color: #475569 !important; }
    .dark-mode select { background: #1e293b !important; color: #e5e7eb !important; border-color: #475569 !important; }

    .dark-mode .meal-tab { background: #334155 !important; color: #d1d5db !important; }

    .dark-mode .ingredient-chip.missing { background: #7f1d1d !important; color: #fca5a5 !important; }
    .dark-mode .modal-content { background: #1e293b !important; color: #e5e7eb !important; }
    .dark-mode .recipe-step { color: #d1d5db !important; }
    .dark-mode .item-row { background: transparent !important; }
    .dark-mode .item-row:hover { background: rgba(71, 85, 105, 0.3) !important; }
    .dark-mode .item-name { color: #e5e7eb !important; }
    .dark-mode .item-qty { color: #9ca3af !important; }
    .dark-mode h2 { color: #e5e7eb !important; }
    .dark-mode p { color: #9ca3af !important; }
    .dark-mode .text-xs { color: #9ca3af !important; }
    .dark-mode .text-sm { color: #d1d5db !important; }
    .dark-mode .text-base { color: #e5e7eb !important; }
    .dark-mode .text-lg { color: #e5e7eb !important; }
    .dark-mode .custom-checkbox { border-color: #4ade80 !important; }
    .dark-mode .custom-checkbox:hover { border-color: #22c55e !important; }
    .custom-checkbox { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid #d1d5db;
      border-radius: 6px; cursor: pointer; transition: all 0.15s ease; position: relative; flex-shrink: 0; }
    .custom-checkbox:checked { background: #22c55e; border-color: #22c55e; }
    .custom-checkbox:checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 6px; height: 10px;
      border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
    .custom-checkbox:hover { border-color: #22c55e; }
    input:focus, select:focus { outline: none; box-shadow: 0 0 0 2px rgba(34,197,94,0.3); }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }
    .item-row:hover .delete-btn { opacity: 1; }
    @media (max-width: 640px) { .delete-btn { opacity: 0.5; } }
    .category-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px;
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .meal-card { transition: all 0.2s ease; cursor: pointer; position: relative; overflow: hidden;
      display: flex; flex-direction: column; height: 100%; }
    .meal-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .meal-card.selected { box-shadow: 0 0 0 2px #22c55e; }
    .meal-card.selected::after { content: ''; position: absolute; inset: 0; border: 3px solid #22c55e; border-radius: 16px; pointer-events: none; }
    .meal-card.selected .meal-check { display: flex; }
    .meal-check { display: none; position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;

      box-shadow: 0 2px 8px rgba(34,197,94,0.4); z-index: 10; }
    .meal-tab { background: #f3f4f6; color: #6b7280; }
    .meal-tab:hover { background: #e5e7eb; }
    .meal-tab.active { background: #22c55e; color: white; }
    .main-tab { background: transparent; color: #9ca3af; border-bottom: 2px solid transparent; }
    .main-tab:hover { color: #374151; }
    .main-tab.active { color: #16a34a; border-color: #16a34a; font-weight: 700; }
    .sticky-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: white; border-top: 1px solid #f3f4f6; box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
      padding: 12px 16px; transition: transform 0.25s ease; }
    .sticky-bar.hidden-bar { transform: translateY(100%); }
    .ingredient-chip { display: inline-block; font-size: 0.65rem; padding: 2px 6px; border-radius: 6px;

    .ingredient-chip.missing { background: #fef2f2; color: #dc2626; }
    .match-ring { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .modal-backdrop { animation: fadeIn 0.2s ease-out; }
    .modal-content { animation: slideUp 0.3s ease-out; }
    .recipe-btn { cursor: pointer; }
    .recipe-btn:hover { background: #f0fdf4; }
    .recipe-btn:active { transform: scale(0.98); }
    .recipe-step { counter-increment: step; }
    .recipe-step::before { content: counter(step); display: inline-flex; align-items: center; justify-content: center;

<body class="min-h-screen bg-gradient-to-br from-gray-50 via-white to-green-50/30 antialiased">

              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>
            </svg>

                   flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
            </svg>
            New List
          </button>
        </div>
      </div>
    </div>

    <!-- Main Tabs -->
    <div class="flex border-b border-gray-100 mb-6 gap-1 overflow-x-auto">
      <button onclick="switchTab('lists')" class="main-tab active px-4 py-2.5 text-sm font-semibold whitespace-nowrap transition-all" data-tab="lists">
        <span class="flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25Z"/></svg>Lists</span>

        <span class="flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 8.25v-1.5m-6 1.5v-1.5m12 9.75-1.5.75a3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0L3 16.5m15-3.379a48.474 48.474 0 0 0-6-.371c-2.032 0-4.034.126-6 .371m12 0c.39.049.777.102 1.163.16 1.07.16 1.837 1.094 1.837 2.175v5.169c0 .621-.504 1.125-1.125 1.125H4.125A1.125 1.125 0 0 1 3 20.625v-5.17c0-1.08.768-2.014 1.837-2.174A47.78 47.78 0 0 1 6 13.12"/></svg>Meal Planner</span>
      </button>
      <button onclick="switchTab('cook')" class="main-tab px-4 py-2.5 text-sm font-semibold whitespace-nowrap transition-all" data-tab="cook">
        <span class="flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>What Can I Cook?</span>
      </button>
    </div>

    <!-- TAB: Shopping Lists -->
    <div id="tab-lists">
      <!-- Search Filter -->
      <div class="mb-4">
        <input id="search-input" type="text" placeholder="Search items..."
          class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm
                 placeholder:text-gray-300 focus:border-brand-500 transition"
          oninput="filterItems(this.value)" />
      </div>
      <div id="lists-container"></div>
      <div id="empty-state" class="hidden text-center py-24 fade-in">
        <div class="w-20 h-20 mx-auto mb-5 rounded-2xl bg-gray-100 flex items-center justify-center">
          <svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/>

    <div id="tab-meals" class="hidden">
      <div class="mb-4">
        <p class="text-sm text-gray-400">Pick meals &middot; ingredients added to your list (serves 2)</p>

      <div id="meal-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-1">
        <button onclick="filterMeals('All')" class="meal-tab active px-4 py-1.5 rounded-full text-xs font-semibold transition-all">All</button>
        <button onclick="filterMeals('Regular')" class="meal-tab px-4 py-1.5 rounded-full text-xs font-semibold transition-all">Regular</button>
        <button onclick="filterMeals('Vegetarian')" class="meal-tab px-4 py-1.5 rounded-full text-xs font-semibold transition-all">Vegetarian</button>
        <button onclick="filterMeals('Keto')" class="meal-tab px-4 py-1.5 rounded-full text-xs font-semibold transition-all">Keto</button>
      </div>
      <div id="meal-section-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-24"></div>
    </div>

    <!-- TAB: What Can I Cook? -->
    <div id="tab-cook" class="hidden">
      <div class="mb-4">
        <p class="text-sm text-gray-400 mb-3">Enter ingredients you have, and we'll suggest recipes</p>

  </div>

  <!-- Recipe Detail Modal -->
  <div id="recipe-modal" class="fixed inset-0 z-50 hidden">

        </button>

      <div class="flex-1 overflow-y-auto p-5">
        <div class="flex items-center gap-2 mb-1">

          <span id="recipe-tag" class="text-xs font-bold px-2 py-0.5 rounded-md"></span>

        <ol id="recipe-steps" class="space-y-3" style="counter-reset:step"></ol>
      </div>
    </div>
  </div>

  <script>
    let lists = [];

    const CATEGORY_COLORS = {

      'Bakery':        { bg: 'bg-amber-50',  text: 'text-amber-700' },
      'Produce':       { bg: 'bg-green-50',  text: 'text-green-700' },
      'Meat':          { bg: 'bg-red-50',    text: 'text-red-600' },
      'Pantry':        { bg: 'bg-orange-50', text: 'text-orange-600' },
      'Frozen':        { bg: 'bg-cyan-50',   text: 'text-cyan-600' },
      'Beverages':     { bg: 'bg-purple-50', text: 'text-purple-600' },
      'Snacks':        { bg: 'bg-pink-50',   text: 'text-pink-600' },

      'Personal Care': { bg: 'bg-violet-50', text: 'text-violet-600' },
      'Other':         { bg: 'bg-gray-50',   text: 'text-gray-500' },
    };

    function catColor(cat) {
      return CATEGORY_COLORS[cat] || CATEGORY_COLORS['Other'];
    }

    // -----------------------------------------------------------------------
    // Auto-categorization
    // -----------------------------------------------------------------------
    const AUTO_CATEGORY = {
      'Dairy': ['milk','cream','cheese','yoghurt','yogurt','butter','curd','cottage','feta','mozzarella','parmesan','sour cream','cream cheese','custard','dairy'],
      'Bakery': ['bread','rolls','buns','muffins','croissant','bagel','pita','wrap','tortilla','cake','scones','pastry','donut','baguette','ciabatta','sourdough','crumpet'],

    function detectCategory(name) {
      const lower = name.toLowerCase().trim();
      if (!lower) return 'Other';
      // Try exact match first, then partial
      for (const [cat, keywords] of Object.entries(AUTO_CATEGORY)) {
        for (const kw of keywords) {
          if (lower === kw) return cat;
        }
      }
      for (const [cat, keywords] of Object.entries(AUTO_CATEGORY)) {
        for (const kw of keywords) {
          if (lower.includes(kw) || kw.includes(lower)) return cat;
        }
      }
      return 'Other';
    }

    function onItemInput(input) {
      const form = input.closest('form');
      const select = form.querySelector('select');
      const detected = detectCategory(input.value);
      select.value = detected;
    }

    // -----------------------------------------------------------------------
    // API helpers
    // -----------------------------------------------------------------------
    async function api(url, opts = {}) {
      const res = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      return res.json();
    }

    // -----------------------------------------------------------------------
    // List actions
    // -----------------------------------------------------------------------
    async function createList() {
      const name = prompt("List name:", "New List");
      if (!name) return;
      await api("/api/lists", { method: "POST", body: { name } });
      loadLists();
    }

    async function deleteList(id) {
      if (!confirm("Delete this entire list and all its items?")) return;
      await api(`/api/lists/${id}`, { method: "DELETE" });
      loadLists();
    }

    function startRenameList(id, el) {
      const current = el.textContent;
      const input = document.createElement("input");
      input.value = current;
      input.className = "text-lg font-bold text-gray-900 border-b-2 border-brand-500 focus:outline-none bg-transparent w-full";
      el.replaceWith(input);
      input.focus();
      input.select();
      const save = async () => {
        const newName = input.value.trim() || current;
        await api(`/api/lists/${id}`, { method: "PATCH", body: { name: newName } });
        loadLists();
      };
      input.addEventListener("blur", save);
      input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); if (e.key === "Escape") { input.value = current; input.blur(); } });
    }

    // -----------------------------------------------------------------------
    // Item actions
    // -----------------------------------------------------------------------
    async function addItem(e, listId) {
      e.preventDefault();
      const form = e.target;
      const [nameInput, catSelect, qtyInput] = form.elements;
      await api("/api/items", {
        method: "POST",
        body: {
          name: nameInput.value.trim(),
          category: catSelect.value,
          quantity: parseInt(qtyInput.value) || 1,
          shoppingListId: listId,
        },
      });
      nameInput.value = "";
      qtyInput.value = "1";
      nameInput.focus();
      loadLists();
    }

    async function toggleItem(id, checked) {
      await api(`/api/items/${id}`, { method: "PATCH", body: { checked } });
      loadLists();
    }

    async function deleteItem(id) {
      await api(`/api/items/${id}`, { method: "DELETE" });
      loadLists();
    }

    // -----------------------------------------------------------------------
    // Tab switching
    // -----------------------------------------------------------------------
    let currentTab = 'lists';
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.main-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('tab-lists').classList.toggle('hidden', tab !== 'lists');
      document.getElementById('tab-meals').classList.toggle('hidden', tab !== 'meals');
      document.getElementById('tab-cook').classList.toggle('hidden', tab !== 'cook');
      document.getElementById('new-list-btn').classList.toggle('hidden', tab !== 'lists');
      // Show/hide sticky bar
      const bar = document.getElementById('sticky-meal-bar');
      if (tab === 'meals' && selectedMeals.size > 0) bar.classList.remove('hidden-bar');
      else bar.classList.add('hidden-bar');
      if (tab === 'meals') renderMealSection();
    }

    // -----------------------------------------------------------------------
    // Meal Planner
    // -----------------------------------------------------------------------
    let meals = [];
    let selectedMeals = new Set();
    let activeFilter = 'All';

    async function loadMeals() {
      meals = await api("/api/meals");
      if (currentTab === 'meals') renderMealSection();
    }

    function mealCardHTML(m) {
      const ingList = m.ingredients.map(i =>
        `<span class="ingredient-chip">${i.quantity > 1 ? i.quantity + 'x ' : ''}${esc(i.name)}</span>`
      ).join("");
      return `
        <div class="meal-card rounded-2xl border border-gray-100 bg-white ${selectedMeals.has(m.id) ? 'selected' : ''}"
             onclick="toggleMeal('${m.id}')">
          <div class="meal-check">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/>
            </svg>
          </div>
          <div class="rounded-t-2xl overflow-hidden" style="width:100%;height:130px;position:relative;background:linear-gradient(135deg,#fff7ed,#fef3c7)">
            <img src="${m.image}" alt="${esc(m.name)}" style="width:100%;height:100%;object-fit:cover"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
            <div style="display:none;width:100%;height:100%;position:absolute;top:0;left:0" class="items-center justify-center">
              <span style="font-size:3.5rem">${m.emoji}</span>
            </div>
          </div>
          <div class="p-3 flex-1 flex flex-col">
            <div class="flex items-center gap-1.5 mb-0.5">
              <h4 class="text-sm font-bold text-gray-900 leading-tight truncate flex-1">${esc(m.name)}</h4>
              <span class="shrink-0 text-[0.6rem] font-bold px-1.5 py-0.5 rounded-md ${
                m.tag === 'Vegetarian' ? 'bg-green-100 text-green-700' :
                m.tag === 'Keto' ? 'bg-purple-100 text-purple-700' :
                'bg-gray-100 text-gray-500'
              }">${m.tag === 'Regular' ? '' : m.tag}</span>
            </div>
            <p class="text-xs text-gray-400 mt-0.5 line-clamp-1">${esc(m.description)}</p>
            <div class="flex flex-wrap mt-2 flex-1">${ingList}</div>
            <p class="text-xs text-gray-300 mt-2">${m.time}</p>
          </div>
          <button onclick="event.stopPropagation();showRecipe('${m.id}')"
            class="recipe-btn w-full flex items-center justify-center gap-1.5 py-2 border-t border-gray-100
                   text-brand-600 hover:bg-brand-50 text-xs font-bold transition-all rounded-b-2xl">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
            How to Cook
          </button>
        </div>`;
    }

    function renderMealSection() {
      if (!meals.length) return;
      const grid = document.getElementById("meal-section-grid");
      const filtered = activeFilter === 'All' ? meals : meals.filter(m => m.tag === activeFilter);
      grid.innerHTML = filtered.map(m => mealCardHTML(m)).join("");
      updateStickyBar();
    }

    function filterMeals(tag) {
      activeFilter = tag;
      document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderMealSection();
    }

    function toggleMeal(id) {
      if (selectedMeals.has(id)) selectedMeals.delete(id);
      else selectedMeals.add(id);
      renderMealSection();
    }

    function updateStickyBar() {
      const count = selectedMeals.size;
      const bar = document.getElementById("sticky-meal-bar");
      if (count > 0 && currentTab === 'meals') bar.classList.remove("hidden-bar");
      else bar.classList.add("hidden-bar");

      document.getElementById("meal-section-count").textContent =
        `${count} meal${count !== 1 ? 's' : ''} selected`;
      document.getElementById("meal-section-btn").disabled = count === 0;

      const merged = {};
      meals.forEach(m => {
        if (selectedMeals.has(m.id)) {
          m.ingredients.forEach(ing => { merged[ing.name.toLowerCase()] = true; });
        }
      });
      const ingCount = Object.keys(merged).length;
      document.getElementById("meal-section-ing").textContent =
        ingCount > 0 ? `(${ingCount} ingredients)` : '';

      const select = document.getElementById("meal-target-list");
      const prev = select.value;
      select.innerHTML = lists.map(l =>
        `<option value="${l.id}">${esc(l.name)}</option>`
      ).join("");
      if (prev) select.value = prev;
    }

    async function addMealsFromSection() {
      const select = document.getElementById("meal-target-list");
      const listId = select.value;
      if (!listId || selectedMeals.size === 0) return;
      const btn = document.getElementById("meal-section-btn");
      btn.textContent = "Adding...";
      btn.disabled = true;
      await api("/api/meals/add-to-list", {
        method: "POST",
        body: { shoppingListId: listId, mealIds: [...selectedMeals] },
      });
      btn.textContent = "Add to List";
      selectedMeals.clear();
      renderMealSection();
      loadLists();
    }

    // -----------------------------------------------------------------------
    // What Can I Cook?
    // -----------------------------------------------------------------------
    let cookIngredients = [];

    function addCookIngredient() {
      const input = document.getElementById("cook-input");
      const vals = input.value.split(",").map(v => v.trim()).filter(Boolean);
      vals.forEach(v => { if (!cookIngredients.includes(v.toLowerCase())) cookIngredients.push(v.toLowerCase()); });
      input.value = "";
      renderCookChips();
      searchRecipes();
    }

    function removeCookIngredient(idx) {
      cookIngredients.splice(idx, 1);
      renderCookChips();
      searchRecipes();
    }

    function renderCookChips() {
      const el = document.getElementById("cook-chips");
      el.innerHTML = cookIngredients.map((ing, i) =>
        `<span class="inline-flex items-center gap-1 bg-brand-50 text-brand-700 px-2.5 py-1 rounded-lg text-xs font-medium">
          ${esc(ing)}
          <button onclick="removeCookIngredient(${i})" class="ml-0.5 hover:text-red-500 transition">&times;</button>
        </span>`
      ).join("");
    }

    async function searchRecipes() {
      const results = document.getElementById("cook-results");
      if (cookIngredients.length === 0) {
        results.innerHTML = '<p class="text-sm text-gray-300 text-center py-12">Add ingredients above to find matching recipes</p>';
        return;
      }
      results.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">Searching...</p>';
      const data = await api("/api/meals/suggest", {
        method: "POST",
        body: { ingredients: cookIngredients },
      });
      if (data.length === 0) {
        results.innerHTML = '<p class="text-sm text-gray-400 text-center py-12">No matching recipes found. Try adding more ingredients.</p>';
        return;
      }
      results.innerHTML = data.map(m => {
        const pctColor = m.matchPct >= 80 ? 'bg-green-100 text-green-700' : m.matchPct >= 50 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-600';
        const matchedChips = m.matched.map(n => `<span class="ingredient-chip">${esc(n)}</span>`).join("");
        const missingChips = m.missing.map(n => `<span class="ingredient-chip missing">${esc(n)}</span>`).join("");
        return `
          <div class="bg-white rounded-2xl border border-gray-100 p-4 mb-3 slide-up">
            <div class="flex items-start gap-3">
              <div class="match-ring ${pctColor}">${m.matchPct}%</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <h4 class="text-sm font-bold text-gray-900 truncate">${esc(m.name)}</h4>
                  <span class="shrink-0 text-[0.6rem] font-bold px-1.5 py-0.5 rounded-md ${
                    m.tag === 'Vegetarian' ? 'bg-green-100 text-green-700' :
                    m.tag === 'Keto' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-500'
                  }">${m.tag === 'Regular' ? '' : m.tag}</span>
                </div>
                <p class="text-xs text-gray-400 mt-0.5">${esc(m.description)} &middot; ${m.time}</p>
                <button onclick="showRecipe('${m.id}')"
                  class="flex items-center gap-1 mt-1.5 bg-brand-50 hover:bg-brand-100 text-brand-700 px-2.5 py-1 rounded-lg text-xs font-semibold transition-all active:scale-95">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
                  View Recipe
                </button>
                <div class="mt-2">
                  <p class="text-[0.6rem] font-semibold text-gray-500 uppercase mb-1">You have (${m.matchCount})</p>
                  <div class="flex flex-wrap">${matchedChips}</div>
                </div>
                ${m.missing.length ? `<div class="mt-1.5">
                  <p class="text-[0.6rem] font-semibold text-gray-500 uppercase mb-1">Still need (${m.missing.length})</p>
                  <div class="flex flex-wrap">${missingChips}</div>
                </div>` : '<p class="text-xs font-semibold text-green-600 mt-2">You have everything!</p>'}
              </div>
            </div>
          </div>`;
      }).join("");
    }

    // -----------------------------------------------------------------------
    // Recipe Detail Modal
    // -----------------------------------------------------------------------
    function showRecipe(id) {
      const m = meals.find(x => x.id === id);
      if (!m) return;
      const modal = document.getElementById('recipe-modal');
      document.getElementById('recipe-img').src = m.image;
      document.getElementById('recipe-img').style.display = '';
      document.getElementById('recipe-title').textContent = m.name;
      const tag = document.getElementById('recipe-tag');
      tag.textContent = m.tag;
      tag.className = 'text-xs font-bold px-2 py-0.5 rounded-md ' + (
        m.tag === 'Vegetarian' ? 'bg-green-100 text-green-700' :
        m.tag === 'Keto' ? 'bg-purple-100 text-purple-700' :
        'bg-gray-100 text-gray-500'
      );
      document.getElementById('recipe-desc').textContent = m.description;
      document.getElementById('recipe-time').textContent = m.time;
      document.getElementById('recipe-ingredients').innerHTML = m.ingredients.map(i =>
        `<span class="ingredient-chip">${i.quantity > 1 ? i.quantity + 'x ' : ''}${esc(i.name)}</span>`
      ).join('');
      const steps = m.steps || [];
      document.getElementById('recipe-steps').innerHTML = steps.map(s =>
        `<li class="recipe-step flex items-start text-sm text-gray-700 leading-relaxed">${esc(s)}</li>`
      ).join('');
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeRecipe() {
      document.getElementById('recipe-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeRecipe();
    });

    // -----------------------------------------------------------------------
    // Dark Mode
    // -----------------------------------------------------------------------
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark);
      updateDarkModeIcon(isDark);
      updateDarkModeStyles(isDark);
    }

    function updateDarkModeIcon(isDark) {
      const lightIcon = document.getElementById('light-icon');
      const darkIcon = document.getElementById('dark-icon');
      if (isDark) {
        lightIcon.style.display = 'none';
        darkIcon.style.display = 'block';
      } else {
        lightIcon.style.display = 'block';
        darkIcon.style.display = 'none';
      }
    }

    function updateDarkModeStyles(isDark) {
      const btn = document.getElementById('dark-mode-btn');
      if (isDark) {
        btn.style.background = '#475569';
        btn.style.color = '#e5e7eb';
      } else {
        btn.style.background = '#f3f4f6';
        btn.style.color = '#374151';
      }
    }

    function initDarkMode() {
      const isDark = localStorage.getItem('darkMode') === 'true';
      if (isDark) {
        document.body.classList.add('dark-mode');
        updateDarkModeIcon(true);
        updateDarkModeStyles(true);
      }
    }

    // -----------------------------------------------------------------------
    // Search & Filter
    // -----------------------------------------------------------------------
    let allListsData = [];

    function filterItems(query) {
      const search = query.toLowerCase().trim();
      const container = document.getElementById('lists-container');

      if (!search) {
        render();
        return;
      }

      const filtered = lists.map(list => ({
        ...list,
        items: list.items.filter(item =>
          item.name.toLowerCase().includes(search) ||
          item.category.toLowerCase().includes(search)
        )
      })).filter(list => list.items.length > 0);

      if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center py-12"><p class="text-gray-400">No items matching "' + esc(search) + '"</p></div>';
        return;
      }

      container.innerHTML = filtered.map(list => {
        const total = list.items.length;
        const checked = list.items.filter(i => i.checked).length;
        const progress = ((checked / total) * 100).toFixed(0);
        const cat_groups = {};
        list.items.forEach(item => {
          if (!cat_groups[item.category]) cat_groups[item.category] = [];
          cat_groups[item.category].push(item);
        });

        return `
          <div class="fade-in mb-6 bg-white dark:bg-gray-800 rounded-2xl shadow-sm overflow-hidden">
            <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
              <div>
                <h2 class="text-base font-bold text-gray-900 dark:text-gray-100">${esc(list.name)}</h2>
                <p class="text-xs text-gray-400 mt-0.5">${checked}/${total} done</p>
              </div>
              <div class="flex gap-2">
                <button onclick="editListName('${list.id}')" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 px-2 py-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25m0-7H6.75m0 9h2.25m0-7H9m3 7h-1.5M6.75 21h7.5m0 0h2.25M6.75 21v-7.5M15 12h1.5m0-7H16.5m3 7h2.25"/></svg>
                </button>
                <button onclick="deleteList('${list.id}')" class="text-gray-400 hover:text-red-600 dark:hover:text-red-400 px-2 py-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
                </button>
              </div>
            </div>
            <div class="p-3 space-y-2 item-list" data-list-id="${list.id}">
              ${list.items.map(item => {
                const color = catColor(item.category);
                return `
                  <div class="item-row flex items-center gap-2.5 p-2.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50 transition group ${item.checked ? 'checked-item' : ''}">
                    <input type="checkbox" class="custom-checkbox" ${item.checked ? 'checked' : ''} onchange="updateItem('${list.id}', '${item.id}', {checked: this.checked})" />
                    <div class="flex-1">
                      <span class="item-name text-sm font-medium text-gray-900 dark:text-gray-100">${esc(item.name)}</span>
                      <div class="flex items-center gap-2 mt-0.5">
                        <span class="item-qty text-xs font-medium text-gray-400">${item.quantity}x</span>
                        <span class="category-pill ${color.bg} ${color.text}">${esc(item.category)}</span>
                      </div>
                    </div>
                    <button class="delete-btn text-gray-300 hover:text-red-600 dark:hover:text-red-400 px-2 py-1" onclick="deleteItem('${list.id}', '${item.id}')">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    // -----------------------------------------------------------------------
    // Utils
    // -----------------------------------------------------------------------
    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    initDarkMode();
    loadMeals();
    loadLists();
  </script>
</body>
</html>
