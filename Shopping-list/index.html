<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping List - Shared</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    body.dark-mode { background: #0f172a; color: #e5e7eb; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    .slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .dark-mode { background: #0f172a !important; color: #e5e7eb !important; }
    .dark-mode .bg-white { background: #1e293b !important; }
    .dark-mode .bg-gray-50 { background: #1e293b !important; }
    .dark-mode .border-gray-100 { border-color: #475569 !important; }
    .dark-mode .border-gray-200 { border-color: #475569 !important; }
    .dark-mode .text-gray-900 { color: #e5e7eb !important; }
    .dark-mode .text-gray-400 { color: #9ca3af !important; }
    .dark-mode input { background: #1e293b !important; color: #e5e7eb !important; border-color: #475569 !important; }
    .dark-mode h2 { color: #e5e7eb !important; }

    .custom-checkbox { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid #d1d5db;
      border-radius: 6px; cursor: pointer; transition: all 0.15s ease; position: relative; flex-shrink: 0; }
    .custom-checkbox:checked { background: #22c55e; border-color: #22c55e; }
    .custom-checkbox:checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 6px; height: 10px;
      border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
    .dark-mode .custom-checkbox { border-color: #4ade80; }

    .checked-item { opacity: 0.5; }
    .checked-item span { text-decoration: line-through; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 via-white to-green-50/30">

  <div class="max-w-xl mx-auto px-4 py-6 sm:py-10">
    <!-- Header -->
    <div class="mb-6 slide-up">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-3xl font-extrabold text-gray-900">🛒 Shopping List</h1>
        <button onclick="toggleDarkMode()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-lg">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </div>

    <!-- View: List Selection / Share Code -->
    <div id="view-welcome" class="fade-in">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-4">
        <h2 class="text-lg font-bold text-gray-900 mb-4">Welcome!</h2>

        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Create New List</label>
            <input id="new-list-name" type="text" placeholder="My Shopping List"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500" />
            <button onclick="createList()" class="w-full mt-2 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition">
              ➕ Create List
            </button>
          </div>

          <div class="border-t pt-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">Join Shared List</label>
            <input id="share-code-input" type="text" placeholder="Enter share code (e.g., ABC123)" maxlength="8"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm uppercase focus:outline-none focus:border-green-500"
              oninput="this.value = this.value.toUpperCase()" />
            <button onclick="joinList()" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
              🔗 Join List
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- View: Shopping List -->
    <div id="view-list" class="hidden">
      <!-- List Header with Share -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-4 slide-up">
        <div class="flex items-center justify-between mb-4">
          <h2 id="list-title" class="text-2xl font-bold text-gray-900"></h2>
          <button onclick="backToWelcome()" class="text-gray-500 hover:text-gray-700">✕</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-xs text-gray-500 font-medium">Share Code</p>
            <p id="share-code-display" class="text-xl font-bold text-green-600 font-mono"></p>
            <button onclick="copyShareCode()" class="text-xs text-gray-500 hover:text-gray-700 mt-1">Copy</button>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-xs text-gray-500 font-medium">Progress</p>
            <p id="list-progress" class="text-xl font-bold text-blue-600">0%</p>
          </div>
        </div>
      </div>

      <!-- Search & Add Item -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
        <input id="search-input" type="text" placeholder="🔍 Search items..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-green-500"
          oninput="filterItems()" />

        <div class="flex gap-2">
          <input id="new-item-input" type="text" placeholder="Add new item..."
            class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"
            onkeydown="if(event.key==='Enter')addItem()" />
          <button onclick="addItem()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold transition">
            ➕
          </button>
        </div>
      </div>

      <!-- Items List -->
      <div id="items-container" class="space-y-2"></div>

      <div id="empty-items" class="text-center py-12 text-gray-400">
        <p>No items yet. Add one above! 👆</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCw6790vLiq7CEbzKFjaMN_pg1V84VdHd4",
      authDomain: "shopping-list-app-d1661.firebaseapp.com",
      databaseURL: "https://shopping-list-app-d1661-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shopping-list-app-d1661",
      storageBucket: "shopping-list-app-d1661.firebasestorage.app",
      messagingSenderId: "272746002002",
      appId: "1:272746002002:web:dd7a1e3fa65628f59d118b",
      measurementId: "G-VGHZR3P7JX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentListId = null;
    let currentListData = {};
    let allItems = [];

    // ===== Dark Mode =====
    window.toggleDarkMode = function() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
      updateThemeIcon();
    };

    function updateThemeIcon() {
      const isDark = document.body.classList.contains('dark-mode');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
    }

    // ===== List Management =====
    window.createList = async function() {
      const name = document.getElementById('new-list-name').value.trim();
      if (!name) return alert('Please enter a list name');

      const shareCode = generateCode();
      const listRef = ref(db, `lists/${shareCode}`);

      await set(listRef, {
        name: name,
        createdAt: new Date().toISOString(),
        items: {}
      });

      loadList(shareCode);
    };

    window.joinList = async function() {
      const code = document.getElementById('share-code-input').value.trim().toUpperCase();
      if (!code || code.length !== 6) return alert('Invalid share code');

      const listRef = ref(db, `lists/${code}`);
      onValue(listRef, (snapshot) => {
        if (!snapshot.exists()) {
          alert('List not found');
          return;
        }
        loadList(code);
      }, { onlyOnce: true });
    };

    function loadList(shareCode) {
      currentListId = shareCode;
      document.getElementById('view-welcome').classList.add('hidden');
      document.getElementById('view-list').classList.remove('hidden');
      document.getElementById('share-code-display').textContent = shareCode;

      const listRef = ref(db, `lists/${shareCode}`);
      onValue(listRef, (snapshot) => {
        if (!snapshot.exists()) return;
        currentListData = snapshot.val();
        document.getElementById('list-title').textContent = currentListData.name;
        allItems = currentListData.items ? Object.entries(currentListData.items).map(([id, item]) => ({ id, ...item })) : [];
        renderItems();
      });
    }

    window.backToWelcome = function() {
      currentListId = null;
      document.getElementById('view-list').classList.add('hidden');
      document.getElementById('view-welcome').classList.remove('hidden');
      document.getElementById('new-list-name').value = '';
      document.getElementById('share-code-input').value = '';
    };

    // ===== Item Management =====
    window.addItem = async function() {
      const name = document.getElementById('new-item-input').value.trim();
      if (!name || !currentListId) return;

      const itemsRef = ref(db, `lists/${currentListId}/items`);
      await push(itemsRef, {
        name: name,
        checked: false,
        createdAt: new Date().toISOString()
      });

      document.getElementById('new-item-input').value = '';
    };

    window.updateItem = async function(itemId, updates) {
      if (!currentListId) return;
      const itemRef = ref(db, `lists/${currentListId}/items/${itemId}`);
      await update(itemRef, updates);
    };

    window.deleteItem = async function(itemId) {
      if (!currentListId) return;
      const itemRef = ref(db, `lists/${currentListId}/items/${itemId}`);
      await remove(itemRef);
    };

    window.toggleItem = function(itemId) {
      const item = allItems.find(i => i.id === itemId);
      if (item) updateItem(itemId, { checked: !item.checked });
    };

    // ===== Rendering =====
    window.filterItems = function() {
      renderItems();
    };

    function renderItems() {
      const search = document.getElementById('search-input')?.value.toLowerCase() || '';
      const filtered = allItems.filter(item => item.name.toLowerCase().includes(search));
      const container = document.getElementById('items-container');
      const empty = document.getElementById('empty-items');

      const checked = allItems.filter(i => i.checked).length;
      const total = allItems.length;
      document.getElementById('list-progress').textContent = total ? Math.round(checked / total * 100) + '%' : '0%';

      if (filtered.length === 0) {
        container.innerHTML = '';
        empty.style.display = total === 0 ? 'block' : 'none';
        return;
      }

      empty.style.display = 'none';
      container.innerHTML = filtered.map(item => `
        <div class="bg-white rounded-lg border border-gray-100 p-3 flex items-center gap-3 ${item.checked ? 'checked-item' : ''} fade-in">
          <input type="checkbox" class="custom-checkbox" ${item.checked ? 'checked' : ''}
            onchange="toggleItem('${item.id}')" />
          <span class="flex-1 text-gray-900">${esc(item.name)}</span>
          <button onclick="deleteItem('${item.id}')" class="text-gray-400 hover:text-red-600 text-sm">🗑️</button>
        </div>
      `).join('');
    }

    window.copyShareCode = function() {
      const code = document.getElementById('share-code-display').textContent;
      navigator.clipboard.writeText(code);
      alert('Share code copied!');
    };

    // ===== Utilities =====
    function generateCode() {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function esc(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    // ===== Init =====
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
    }
    updateThemeIcon();
  </script>

</body>
</html>
